<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recordatorio de Evaluación</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            width: 80%;
            margin: 20px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #00953a;
            padding: 15px;
            border-radius: 8px 8px 0 0;
            color: white;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .content {
            padding: 20px;
        }
        .content p {
            margin: 10px 0;
        }
        .section {
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .section-title {
            font-weight: bold;
            font-size: 18px;
            color: #00953a;
            margin-bottom: 10px;
        }
        .footer {
            background-color: #12284c;
            padding: 15px;
            border-radius: 0 0 8px 8px;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Es momento de calificar a tu departamento!</h1>
            <p>Ingresa al siguiente enlace: <a href="http://evaluacionescsh.cesehsa.com:89/accounts/login/" style="color: white; text-decoration: underline;">http://evaluacionescsh.cesehsa.com:89/accounts/login/</a></p>
        </div>
    </div>
</body>
</html>
